<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF AI Tool</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f5;
    --surface: #ffffff;
    --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #1a1a1a;
    --text2: #6b6b67;
    --blue: #378ADD;
    --blue-bg: #E6F1FB;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --coral: #D85A30;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #252523;
      --surface2: #2e2e2c;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --text: #f0ede8;
      --text2: #9a9892;
      --blue: #5aaae8;
      --blue-bg: #0c2d4a;
      --red-bg: #3a1515;
      --red-text: #f09595;
      --coral: #f09060;
    }
  }

  body {
    font-family: -apple-system, 'Segoe UI', Tahoma, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

.container {
    width: 100%;
    max-width: 680px;
  }

  header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }

  header h1 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  header p {
    font-size: 14px;
    color: var(--text2);
  }

.card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  #drop-zone {
    border: 2px dashed var(--border2);
    border-radius: var(--radius-lg);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    background: var(--surface2);
    position: relative;
    margin-bottom: 1rem;
  }

  #drop-zone.drag-over {
    border-color: var(--blue);
    background: var(--blue-bg);
  }

  #drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }

  #drop-zone svg { margin-bottom: 10px; color: var(--text2); }

  #drop-zone.title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  #drop-zone.sub { font-size: 13px; color: var(--text2); }

  #file-info {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: var(--radius-md);
    font-size: 13px;
    margin-bottom: 1rem;
    border: 0.5px solid var(--border);
  }

  #file-info.name { font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #file-info.size { color: var(--text2); flex-shrink: 0; }

.btn-row { display: flex; gap: 10px; }

.btn {
    flex: 1; padding: 12px 20px;
    border-radius: var(--radius-md);
    font-size: 15px; font-weight: 500;
    cursor: pointer; border: none;
    transition: opacity 0.2s, transform 0.1s;
    display: flex; align-items: center;
    justify-content: center; gap: 8px;
    font-family: inherit;
  }

.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn:not(:disabled):hover { opacity: 0.88; }
.btn:not(:disabled):active { transform: scale(0.98); }
.btn-dark { background: var(--text); color: var(--bg); }
.btn-blue { background: var(--blue); color: #fff; }

  #error-box {
    display: none; margin-top: 1rem; padding: 12px 16px;
    border-radius: var(--radius-md);
    background: var(--red-bg); color: var(--red-text);
    font-size: 13px;
  }

  #loader {
    display: none; padding: 2rem; text-align: center;
    color: var(--text2); font-size: 14px; margin-top: 1rem;
  }

.dots::after {
    content: ''; animation: dots 1.2s infinite;
  }
  @keyframes dots {
    0%,20% { content: '.'; }
    40% { content: '..'; }
    60%,100% { content: '...'; }
  }

  #result-box {
    display: none; margin-top: 1rem;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface);
    overflow: hidden;
  }

  #result-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface2);
  }

  #result-label { font-size: 13px; font-weight: 500; color: var(--text2); }

  #copy-btn {
    font-size: 12px; padding: 5px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    cursor: pointer; color: var(--text2);
    display: flex; align-items: center; gap: 5px;
    font-family: inherit;
    transition: background 0.15s;
  }
  #copy-btn:hover { background: var(--border); }

  #result-content {
    padding: 1.25rem 1.5rem;
    font-size: 14px; line-height: 2;
    color: var(--text); white-space: pre-wrap;
    direction: rtl; text-align: right;
    max-height: 520px; overflow-y: auto;
  }

  footer {
    margin-top: 3rem; text-align: center;
    font-size: 12px; color: var(--text2);
  }

  @media (max-width: 480px) {
  .btn-row { flex-direction: column; }
    #drop-zone { padding: 1.8rem 1rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>📄 PDF AI Tool</h1>
    <p>ارفع ملف PDF — لخصه أو اعمل منه كويز في ثوان</p>
  </header>

  <div class="card">
    <div id="drop-zone" ondragover="handleDrag(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
      <input type="file" accept=".pdf" id="file-input" onchange="handleFile(event)" />
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" display="block" style="margin: 0 auto 10px;">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p class="title">اسحب الـ PDF هنا</p>
      <p class="sub">أو اضغط للاختيار من جهازك</p>
    </div>

    <div id="file-info">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--coral)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="name" id="file-name"></span>
      <span class="size" id="file-size"></span>
    </div>

    <div class="btn-row">
      <button class="btn btn-dark" id="btn-summary" onclick="run('summary')" disabled>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span id="lbl-summary">لخص PDF</span>
      </button>
      <button class="btn btn-blue" id="btn-quiz" onclick="run('quiz')" disabled>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span id="lbl-quiz">اعمل كويز</span>
      </button>
    </div>

    <div id="error-box"></div>
  </div>

  <div id="loader"><span class="dots" id="loader-text">جاري المعالجة</span></div>

  <div id="result-box">
    <div id="result-header">
      <span id="result-label"></span>
      <button id="copy-btn" onclick="copyResult()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        نسخ
      </button>
    </div>
    <div id="result-content"></div>
  </div>

  <footer>
    ENG \ Ziad khafagh &nbsp;·&nbsp; يعمل في المتصفح مباشرةً
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const WORKER_URL = 'https://pdf-ai-tool.zzyad0082.workers.dev/functions/summarize';

let pdfFile = null;
let currentResult = '';

function handleDrag(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}
function handleDragLeave() {
  document.getElementById('drop-zone').classList.remove('drag-over');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') setFile(f);
}
function handleFile(e) {
  const f = e.target.files[0];
  if (f) setFile(f);
}
function setFile(f) {
  pdfFile = f;
  document.getElementById('file-name').textContent = f.name;
  document.getElementById('file-size').textContent = '(' + (f.size / 1024).toFixed(0) + ' KB)';
  document.getElementById('file-info').style.display = 'flex';
  document.getElementById('btn-summary').disabled = false;
  document.getElementById('btn-quiz').disabled = false;
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('result-box').style.display = 'none';
}

async function extractText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + '\n';
    if (text.length > 14000) break;
  }
  return text.slice(0, 14000);
}

async function run(mode) {
  if (!pdfFile) return;

  const btnS = document.getElementById('btn-summary');
  const btnQ = document.getElementById('btn-quiz');
  const loader = document.getElementById('loader');
  const loaderText = document.getElementById('loader-text');
  const errorBox = document.getElementById('error-box');
  const resultBox = document.getElementById('result-box');

  btnS.disabled = true; btnQ.disabled = true;
  errorBox.style.display = 'none';
  resultBox.style.display = 'none';
  loader.style.display = 'block';
  loaderText.textContent = mode === 'summary'? 'جاري التلخيص' : 'جاري صنع الكويز';

  try {
    const text = await extractText(pdfFile);
    if (!text || text.trim().length < 50) {
      throw new Error('الملف فاضي أو محتواه صور غير قابلة للقراءة');
    }

    const prompt = mode === 'summary'
    ? 'لخص النص ده في 5 نقاط مرقمة بالعربي، كل نقطة جملة واحدة أو اتنين واضحة ومفيدة.\n\n' + text
      : 'اعمل 10 أسئلة اختيار من متعدد MCQ من النص ده بالعربي. كل سؤال: اكتب السؤال ثم 4 اختيارات (أ، ب، ج، د) ثم الإجابة الصحيحة. افصل بين الأسئلة بسطر فاضي.\n\n' + text;

    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: 'أنت مساعد تعليمي ممتاز. اكتب بالعربي فقط. كن واضحاً ومنظماً.',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'حدث خطأ في الـ API');

    const result = data.content.map(b => b.text || '').join('');
    currentResult = result;

    loader.style.display = 'none';
    document.getElementById('result-label').textContent = mode === 'summary'? '📋 الملخص' : '📝 الكويز';
    document.getElementById('result-content').textContent = result;
    resultBox.style.display = 'block';
    resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    loader.style.display = 'none';
    errorBox.style.display = 'block';
    errorBox.textContent = '⚠️ خطأ: ' + err.message;
  } finally {
    btnS.disabled = false; btnQ.disabled = false;
  }
}

function copyResult() {
  if (!currentResult) return;
  navigator.clipboard.writeText(currentResult).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ اتنسخ!';
    setTimeout(() => {
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> نسخ';
    }, 2000);
  });
}
</script>
</body>
</html>
